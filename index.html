<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orientamento Universitario</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#fafbfd;--bg-warm:#f8f6f3;--bg-card:#fff;--bg-input:#f4f5f7;--accent:#4f46e5;--accent-light:#818cf8;--accent-bg:rgba(79,70,229,.06);--green:#059669;--green-light:#d1fae5;--amber:#d97706;--rose:#e11d48;--cyan:#0891b2;--violet:#7c3aed;--text:#1e293b;--text-sec:#64748b;--text-mut:#94a3b8;--border:#e2e8f0;--border-light:#f1f5f9;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 30px rgba(0,0,0,.08);--radius:16px;--radius-sm:10px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:280px;background:linear-gradient(180deg,rgba(79,70,229,.03) 0%,rgba(8,145,178,.015) 40%,transparent 100%);pointer-events:none;z-index:0}
.dot-bg{position:fixed;top:0;left:0;right:0;bottom:0;background-image:radial-gradient(circle,rgba(79,70,229,.03) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;z-index:0}
#sticky-header{position:fixed;top:0;left:0;right:0;z-index:102;background:rgba(255,255,255,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(226,232,240,.7);padding:14px 24px 10px;transition:all .3s;display:none;box-shadow:0 2px 12px rgba(0,0,0,.04)}
#sticky-header.compact{padding:10px 24px 8px}
#sticky-header .ht{font-family:'Playfair Display',serif;font-size:1.15em;color:var(--accent);line-height:1.2}
#sticky-header.compact .ht{font-size:1.05em}
#sticky-header .hs{font-size:.78em;color:var(--text-sec);margin-top:2px}
#sticky-header.compact .hs{font-size:.72em}
#sticky-header .hi{font-size:.72em;color:var(--text-mut);margin-top:3px;line-height:1.4;max-height:3.0em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;text-overflow:ellipsis;transition:max-height .3s}
#sticky-header.compact .hi{max-height:2.8em;font-size:.68em;-webkit-line-clamp:2}
#progress-container{position:fixed;top:0;left:0;right:0;z-index:101;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);padding:0;display:none}
#pbo{height:14px;background:var(--border-light);width:100%;border-radius:0 0 7px 7px;overflow:hidden;position:relative;box-shadow:inset 0 1px 3px rgba(0,0,0,.08)}
#pbi{height:100%;width:0%;background:linear-gradient(90deg,#ef4444,#f97316,#eab308,#22c55e,#3b82f6,#8b5cf6);transition:width .5s cubic-bezier(.4,0,.2,1);border-radius:0 7px 7px 0;position:relative;box-shadow:0 2px 8px rgba(79,70,229,.25),inset 0 1px 0 rgba(255,255,255,.3);overflow:hidden}
#pbi::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:shimmer 2.2s infinite}
@keyframes shimmer{0%{left:-100%}100%{left:100%}}
#pbi-pct{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:.6em;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);white-space:nowrap;z-index:2}
#sticky-footer{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-top:1px solid var(--border);padding:10px 24px;display:none}
#sticky-footer .sf-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;max-width:820px;margin:0 auto}
#sticky-footer .sf-cnt{font-family:'JetBrains Mono',monospace;font-size:.78em;color:var(--text-sec);white-space:nowrap}
.ctn{max-width:820px;margin:0 auto;padding:20px;padding-bottom:80px;position:relative;z-index:1}
.ws{text-align:center;padding:40px 20px;animation:fu .7s ease}
.ws h1{font-family:'Playfair Display',serif;font-size:2.4em;color:var(--text);margin-bottom:8px;line-height:1.15}
.ws h1 span{color:var(--accent)}
.ws .ci{font-size:3em;display:block;margin-bottom:14px;animation:pu 2.5s infinite}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.ws p{color:var(--text-sec);font-size:1.02em;line-height:1.7;max-width:560px;margin:0 auto 22px}
.uf{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:480px;margin:0 auto 22px;box-shadow:var(--shadow-sm)}
.uf label{display:block;font-size:.75em;color:var(--text-mut);margin-bottom:4px;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.uf input,.uf select{width:100%;padding:10px 13px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:1em;margin-bottom:13px;outline:none;transition:border .3s}
.uf input:focus,.uf select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 26px;border:none;border-radius:var(--radius-sm);font-family:'Source Sans 3',sans-serif;font-weight:700;font-size:.92em;cursor:pointer;transition:all .25s}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(79,70,229,.2)}.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,70,229,.3)}
.btn-s{background:var(--bg-card);color:var(--text);border:1px solid var(--border)}.btn-s:hover{border-color:var(--accent);background:var(--accent-bg)}
.btn-sm{padding:7px 14px;font-size:.8em}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{box-shadow:0 4px 14px rgba(5,150,105,.3)}
.hub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:26px 0}
.qsc{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .3s;position:relative;box-shadow:var(--shadow-sm)}
.qsc:hover{transform:translateY(-3px);border-color:var(--accent-light);box-shadow:var(--shadow)}
.qsc .qi{font-size:1.6em;display:block;margin-bottom:6px}.qsc .qn{font-weight:700;font-size:.85em;margin-bottom:2px}.qsc .qd{font-size:.72em;color:var(--text-sec);line-height:1.4}
.qsc .qb{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62em;font-weight:800}
.qb.ok{background:var(--green-light);color:var(--green)}.qb.no{background:var(--bg-input);color:var(--text-mut)}
.qsc.done{border-color:var(--green);background:linear-gradient(135deg,#f0fdf4,#f0f9ff)}.qsc.done .qn{color:var(--green)}
.blk-label{font-size:.72em;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-mut);margin:18px 0 6px;text-align:left}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.qsec{animation:fu .4s ease}
.qc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;transition:all .4s;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.qc::after{content:'';position:absolute;top:0;left:0;width:0;height:100%;transition:width .5s;z-index:0}
.qc.ans::after{width:100%;background:linear-gradient(135deg,rgba(219,234,254,.5),rgba(209,250,229,.3))}
.qc.ans{border-color:var(--accent-light)}.qc>*{position:relative;z-index:1}
.qc .qnum{font-family:'JetBrains Mono',monospace;font-size:.68em;color:var(--accent);font-weight:600;margin-bottom:4px}
.qc.ans .qnum::after{content:' \2713';color:var(--green);font-weight:800;animation:pi .3s ease}
@keyframes pi{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.qc .qt{font-size:.95em;line-height:1.55;margin-bottom:10px}
.ls{display:flex;gap:5px;flex-wrap:wrap}
.lo{flex:1;min-width:60px;text-align:center;padding:8px 4px;background:var(--bg-input);border:2px solid transparent;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;user-select:none}
.lo:hover{border-color:var(--accent-light);background:#eef2ff;transform:translateY(-1px)}
.lo.sel{border-color:var(--accent);background:linear-gradient(135deg,#eef2ff,#ede9fe)}
.lo .lv{font-family:'JetBrains Mono',monospace;font-size:1.2em;font-weight:700;color:var(--accent);display:block;margin-bottom:1px}
.lo .ll{font-size:.58em;color:var(--text-sec);text-transform:uppercase;letter-spacing:.3px;font-weight:700}
.tb{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:10px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border)}
.tb .btn{font-size:.76em;padding:6px 12px}
.rp{animation:fu .5s ease}
.rc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.rc h3{font-family:'Playfair Display',serif;font-size:1.12em;margin-bottom:10px;color:var(--accent)}
.sbc{margin-bottom:10px}.sbl{display:flex;justify-content:space-between;margin-bottom:3px;font-size:.8em}
.sbl span:first-child{color:var(--text);font-weight:600}.sbl span:last-child{color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:600}
.sb{height:8px;background:var(--bg-input);border-radius:4px;overflow:hidden}
.sbf{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--accent),var(--accent-light))}
.cc{position:relative;height:280px;margin:14px 0}
.nt{font-size:.9em;line-height:1.85;color:var(--text-sec);padding:20px;background:var(--bg-warm);border-radius:var(--radius-sm);border-left:4px solid var(--accent)}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.mo.act{display:flex}
.mc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);max-width:700px;width:100%;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow-lg)}
.mc h2{font-family:'Playfair Display',serif;margin-bottom:10px;color:var(--accent)}
.mc textarea{width:100%;min-height:280px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.75em;padding:12px;resize:vertical;outline:none}
.st{position:fixed;bottom:70px;right:18px;z-index:200;background:var(--bg-card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1em;transition:all .3s;box-shadow:var(--shadow)}
.st:hover{border-color:var(--accent);transform:scale(1.08)}
.prompt-box{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px;position:relative}
.prompt-box pre{font-size:.75em;white-space:pre-wrap;line-height:1.6;color:var(--text-sec);font-family:'JetBrains Mono',monospace}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:10px 22px;border-radius:var(--radius-sm);font-size:.84em;font-weight:600;opacity:0;transition:all .4s;z-index:500;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ph{display:none;text-align:center;margin-bottom:24px;padding-bottom:14px;border-bottom:3px solid var(--accent)}.ph h1{color:var(--accent);font-family:'Playfair Display',serif;font-size:1.6em}.ph p{color:var(--text-sec);margin-top:3px}
.nb{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:24px;padding:14px 18px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);position:sticky;bottom:10px;z-index:10}
.nc{font-family:'JetBrains Mono',monospace;font-size:.82em;color:var(--text-sec);font-weight:600}
#sticky-header .sn{display:none;align-items:center;gap:10px;margin-top:8px}
@media print{body{background:#fff!important}body::before,.dot-bg{display:none!important}.tb,.st,#sticky-header,#sticky-footer,.no-print,.toast,.nb{display:none!important}.ctn{max-width:100%;padding:8px}.rc{break-inside:avoid;box-shadow:none!important}.ph{display:block!important}.cc{height:250px!important}}
@media(max-width:600px){.ws h1{font-size:1.5em}.ls{flex-direction:column}.lo{min-width:unset}.hub-grid{grid-template-columns:1fr}.ctn{padding:10px;padding-bottom:80px}#sticky-footer .sf-bar{flex-wrap:wrap;justify-content:center}}
</style>
</head>
<body>
<div class="dot-bg"></div>
<div class="st" id="sndT" title="Audio on/off" onclick="tglSnd()">&#128266;</div>
<div id="toast-el" class="toast"></div>
<div id="sticky-header"><div class="ht" id="hT"></div><div class="hs" id="hS"></div><div class="hi" id="hI"></div><div class="sn" id="stickyNav"></div></div>
<div id="progress-container"><div id="pbo"><div id="pbi"><span id="pbi-pct">0%</span></div></div></div>
<div class="ctn" id="app"></div>
<div id="sticky-footer" style="display:none"></div>
<div class="mo" id="opM"><div class="mc"><h2>&#128203; Report Operatore</h2><p style="color:var(--text-sec);margin-bottom:10px;font-size:.84em">Testo strutturato per analisi IA</p><textarea id="opT" readonly></textarea><div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap"><button class="btn btn-p btn-sm" onclick="cpOp()">&#128203; Copia</button><button class="btn btn-g btn-sm" onclick="exMD()">Markdown</button><button class="btn btn-s btn-sm" onclick="clMo()">Chiudi</button></div></div></div>
<input type="file" id="impI" accept=".json" onchange="hImp(event)" style="display:none">
<script>
/* ===== QUESTIONNAIRE DATA ===== */
const Q=[

/* ---- BLOCCO 1: STRATEGIE COMPORTAMENTALI ED EMOTIVE ---- */
{id:'fronteggiamento',title:'Modalità di Fronteggiamento',subtitle:'Come affronti le sfide?',instruction:'Leggi ogni affermazione e indica quanto ti corrisponde. Non ci sono risposte giuste o sbagliate.',icon:'🛡️',
scale:[{v:0,l:'Mai'},{v:1,l:'Raramente'},{v:2,l:'A volte'},{v:3,l:'Spesso'},{v:4,l:'Sempre'}],
items:[
{n:1,t:'Quando ho un problema chiedo aiuto ad altri',a:'Ricerca di aiuto'},
{n:2,t:'Raccolgo tutte le informazioni possibili prima di decidere',a:'Progettualità'},
{n:3,t:'Considero tutti i modi per affrontare un problema',a:'Progettualità'},
{n:4,t:'Prima di fare qualcosa di importante ascolto il parere degli altri',a:'Ricerca di aiuto'},
{n:5,t:'Se sono preoccupato/a cerco qualcuno con cui parlare',a:'Ricerca di aiuto'},
{n:6,t:'Immagino i passaggi necessari per risolvere un problema',a:'Progettualità'},
{n:7,t:'Se ho dei dubbi chiedo il parere ad altre persone',a:'Ricerca di aiuto'},
{n:8,t:'Stabilisco le priorità quando ho molte decisioni da prendere',a:'Progettualità'},
{n:9,t:'Cerco il confronto con chi ha già affrontato situazioni simili',a:'Ricerca di aiuto'},
{n:10,t:'Mi creo un piano B prima di agire',a:'Progettualità'},
{n:11,t:'Quando ho bisogno di supporto, so a chi rivolgermi',a:'Ricerca di aiuto'},
{n:12,t:'Affronto i problemi passo dopo passo',a:'Progettualità'}],
areas:{
'Ricerca di aiuto':{d:'Tendenza a coinvolgere altri nel fronteggiamento.',i:[1,4,5,7,9,11],m:24},
'Progettualità':{d:'Capacità di pianificare strategie autonome.',i:[2,3,6,8,10,12],m:24}}},

{id:'coping',title:'Stili di Coping',subtitle:'Quali strategie usi sotto pressione?',instruction:'Indica quanto ciascuna affermazione descrive il tuo comportamento abituale nelle situazioni difficili.',icon:'⚙️',
scale:[{v:0,l:'Mai'},{v:1,l:'Raramente'},{v:2,l:'A volte'},{v:3,l:'Spesso'},{v:4,l:'Sempre'}],
items:[
{n:1,t:'Cerco attivamente informazioni per risolvere un problema',a:'Attivo'},
{n:2,t:'Tendo a rimandare sperando che si risolva da sola',a:'Evitante',r:true},
{n:3,t:'Cerco attività rilassanti quando sono stressato/a',a:'Emotivo'},
{n:4,t:'Cambio strategia se la prima non funziona',a:'Attivo'},
{n:5,t:'Evito situazioni dove potrei fallire',a:'Evitante',r:true},
{n:6,t:'Vedo le difficoltà da una prospettiva diversa',a:'Emotivo'},
{n:7,t:'Mi attivo subito di fronte a un problema',a:'Attivo'},
{n:8,t:'Preferisco isolarmi piuttosto che chiedere aiuto',a:'Evitante',r:true},
{n:9,t:'Esprimo le mie emozioni in modo costruttivo',a:'Emotivo'},
{n:10,t:'Analizzo le cause prima di agire',a:'Attivo'},
{n:11,t:'Rinuncio facilmente quando le cose si complicano',a:'Evitante',r:true},
{n:12,t:'Mi concedo pause per ricaricare nei momenti difficili',a:'Emotivo'}],
areas:{
'Attivo':{d:'Affrontamento diretto e orientato al problema.',i:[1,4,7,10],m:16},
'Evitante':{d:'Tendenza a sottrarsi alle difficoltà.',i:[2,5,8,11],m:16,neg:true},
'Emotivo':{d:'Gestione consapevole delle emozioni.',i:[3,6,9,12],m:16}}},

{id:'locus',title:'Locus of Control',subtitle:'Chi tiene il timone della tua vita?',instruction:'Esprimi il tuo grado di accordo con ciascuna affermazione.',icon:'🧭',
scale:[{v:0,l:'Falso'},{v:1,l:'Poco vero'},{v:2,l:'Incerto'},{v:3,l:'Vero'},{v:4,l:'Molto vero'}],
items:[
{n:1,t:'Ciò che accade dipende dalla mia determinazione personale',a:'Interno'},
{n:2,t:'Trovare un buon percorso è più questione di fortuna che di impegno',a:'Esterno'},
{n:3,t:'Per avere successo occorre valorizzare le proprie competenze',a:'Interno'},
{n:4,t:'Il successo negli studi dipende soprattutto dalla fortuna',a:'Esterno'},
{n:5,t:'La flessibilità e la capacità di adattamento sono essenziali per il mio futuro',a:'Interno'},
{n:6,t:'Ottenere risultati dipende principalmente dalle conoscenze e dagli aiuti esterni',a:'Esterno'},
{n:7,t:'Le mie scelte fanno la differenza nel mio percorso',a:'Interno'},
{n:8,t:'Le opportunità arrivano per caso, non per merito',a:'Esterno'},
{n:9,t:'Sono io il principale artefice del mio futuro',a:'Interno'},
{n:10,t:'Chi conosci conta più di ciò che sai',a:'Esterno'}],
areas:{
'Interno':{d:'Convinzione di essere artefice dei propri risultati.',i:[1,3,5,7,9],m:20},
'Esterno':{d:'Attribuzione dei risultati a fattori esterni.',i:[2,4,6,8,10],m:20}}},

/* ---- BLOCCO 2: PROFILO COGNITIVO E COMPETENZE ---- */
{id:'cognitivi',title:'Orientamenti Cognitivi',subtitle:'Quanto questi comportamenti ti descrivono?',instruction:'Leggi ogni affermazione e indica con quale frequenza questo comportamento ti rappresenta.',icon:'🧠',
scale:[{v:0,l:'Per niente'},{v:1,l:'Poco'},{v:2,l:'Abbastanza'},{v:3,l:'Molto'},{v:4,l:'Moltissimo'}],
items:[
{n:1,t:'Usi mappe, schemi o disegni per orientarti o per ricordare informazioni.',a:'Visuo-Spaziale'},
{n:2,t:'Leggi, scrivi o giochi con le parole nel tempo libero.',a:'Linguistica'},
{n:3,t:'Ti accorgi dello stato d\'animo degli altri anche senza che lo dicano.',a:'Interpersonale'},
{n:4,t:'Riconosci melodie, ritmi o variazioni musicali con facilità.',a:'Musicale'},
{n:5,t:'Impari più facilmente quando puoi fare qualcosa con le mani o muoverti.',a:'Cinestetica'},
{n:6,t:'Ti fermi a riflettere su di te, sui tuoi valori e su come stai.',a:'Intrapersonale'},
{n:7,t:'Affronti rompicapi, puzzle o problemi logici per piacere.',a:'Logico-Matematica'},
{n:8,t:'Cerchi occasioni per stare a contatto con la natura o con gli animali.',a:'Naturalistica'},
{n:9,t:'Ti capita di fermarti a chiederti il senso di quello che fai o del perché esisti.',a:'Filosofico-Esistenziale'},
{n:10,t:'Ricordi facilmente immagini, volti o scenari che hai visto.',a:'Visuo-Spaziale'},
{n:11,t:'Quando devi spiegare qualcosa, usi le parole più che gesti o disegni.',a:'Linguistica'},
{n:12,t:'Gestisci le dinamiche di gruppo senza che ti crei tensione.',a:'Interpersonale'},
{n:13,t:'Suoni uno strumento, canti o hai praticato musica con continuità.',a:'Musicale'},
{n:14,t:'Controlli bene il tuo corpo in attività che richiedono coordinazione.',a:'Cinestetica'},
{n:15,t:'Sai riconoscere con chiarezza in cosa sei bravo/a e dove invece fatichi.',a:'Intrapersonale'},
{n:16,t:'Usi numeri, dati o statistiche per capire o spiegare situazioni.',a:'Logico-Matematica'},
{n:17,t:'Noti cambiamenti nell\'ambiente naturale che altri tendono a ignorare.',a:'Naturalistica'},

{n:26,t:'Classifichi, organizzi o studia elementi del mondo naturale per interesse.',a:'Naturalistica'},

{n:28,t:'Quando devi seguire istruzioni, preferisci schemi o diagrammi al testo scritto.',a:'Visuo-Spaziale'},

{n:30,t:'Le persone ti cercano spontaneamente per consigli o supporto.',a:'Interpersonale'},
{n:31,t:'Distingui sfumature sonore — toni, accordi, ritmi — anche senza formazione musicale.',a:'Musicale'},
{n:32,t:'Impari più efficacemente con simulazioni, role-play o esperienze pratiche dirette.',a:'Cinestetica'},
{n:33,t:'Riesci a motivarti e a gestire le tue emozioni anche nei momenti difficili.',a:'Intrapersonale'},

{n:35,t:'Esplori attivamente la diversità degli esseri viventi o degli ecosistemi.',a:'Naturalistica'},

/* ===== SCORING ===== */
function calcScores(qi){
  const q=Q[qi],ans=answers[q.id]||{},res={};
  for(const[aName,aData]of Object.entries(q.areas)){
    let sum=0,cnt=0;
    aData.i.forEach(n=>{if(ans[n]!==undefined){sum+=ans[n];cnt++}});
    const pct=aData.m>0?Math.round(sum/aData.m*100):0;
    res[aName]={sum,max:aData.m,pct,neg:!!aData.neg,desc:aData.d,cnt};
  }
  return res;
}
function calcAllScores(){const all={};enabledQ.forEach(qi=>{all[Q[qi].id]=calcScores(qi)});return all}

/* ===== DISCIPLINARY MATCHING ===== */
function calcMatch(){
  const sc=calcAllScores();
  const areas=Object.keys(areaInfo);
  const ranking=[];
  const perfMap={
    'STEM':['Rendimento Scolastico'],'Medico-Sanitaria':['Rendimento Scolastico'],
    'Economico-Giuridica':['Rendimento Scolastico'],'Umanistica e Formazione':['Rendimento Scolastico'],
    'Sociale e Comunicazione':['Rendimento Scolastico'],'Artistica Design Spettacolo':['Rendimento Scolastico'],
    'Agraria e Ambientale':['Rendimento Scolastico'],'Architettura e Territorio':['Rendimento Scolastico'],
    'Psicologica':['Rendimento Scolastico'],'Motoria e Sportiva':['Rendimento Scolastico']
  };
  const passioniMap={
    'STEM':'Digitale e Gaming','Artistica Design Spettacolo':'Arte e Immagini',
    'Motoria e Sportiva':'Sport e Movimento','Agraria e Ambientale':'Natura e Animali',
    'Sociale e Comunicazione':'Sociale e Aiuto','Musica':''
  };
  const cogMap={
    'STEM':'Logico-Matematica','Umanistica e Formazione':'Linguistica',
    'Artistica Design Spettacolo':'Visuo-Spaziale','Psicologica':'Intrapersonale',
    'Sociale e Comunicazione':'Interpersonale','Architettura e Territorio':'Visuo-Spaziale',
    'Motoria e Sportiva':'Cinestetica','Agraria e Ambientale':'Naturalistica'
  };

  areas.forEach(area=>{
    let total=0;
    const intSc=sc.interessi_uni;
    if(intSc&&intSc[area])total+=(intSc[area].pct/100)*.45;
    const stSc=sc.storia;
    if(stSc&&stSc['Rendimento Scolastico'])total+=(stSc['Rendimento Scolastico'].pct/100)*.15;
    const ssSc=sc.softskills;
    if(ssSc){const ks=Object.keys(ssSc).filter(k=>!ssSc[k].neg);const avg=ks.length?ks.reduce((a,k)=>a+ssSc[k].pct,0)/ks.length:50;total+=(avg/100)*.10}
    let psy=50;if(sc.locus)psy=sc.locus['Interno']?.pct||50;if(sc.coping)psy=(psy+(sc.coping['Attivo']?.pct||50))/2;
    total+=(psy/100)*.05;
    const appSc=sc.apprendimento;
    if(appSc){let m=50;
      if(['STEM','Medico-Sanitaria','Architettura e Territorio','Motoria e Sportiva'].includes(area)&&appSc['Pragmatico'])m=appSc['Pragmatico'].pct;
      if(['Umanistica e Formazione','Economico-Giuridica','Psicologica'].includes(area)&&appSc['Riflessivo'])m=appSc['Riflessivo'].pct;
      if(['STEM','Psicologica'].includes(area)&&appSc['Teorico'])m=(m+(appSc['Teorico'].pct))/2;
      total+=(m/100)*.10}
    const ppSc=sc.passioni_personali;
    if(ppSc&&passioniMap[area]){const pk=passioniMap[area];if(pk&&ppSc[pk])total+=(ppSc[pk].pct/100)*.10}
    const cogSc=sc.cognitivi;
    if(cogSc&&cogMap[area]){const ck=cogMap[area];if(cogSc[ck])total+=(cogSc[ck].pct/100)*.05}
    ranking.push({area,pct:Math.round(total*100)});
  });
  ranking.sort((a,b)=>b.pct-a.pct);
  return ranking;
}

    +'<button class="btn btn-sm '+(allDone?'btn-g':'btn-p')+'" id="bnb" onclick="goHub()">'+(allDone?'✓ Completato':'Salva e torna')+'</button>'
    +'</div></div>';
  app.innerHTML=h;
  updateGlobalBar();
  window.scrollTo({top:0,behavior:'smooth'});
}

function pick(qid,n,v,el){
  sClick();answers[qid][n]=v;
  const card=el.closest('.qc');card.querySelectorAll('.lo').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');card.classList.add('ans');
  autoSaveCheck();updateFooter(Q[enabledQ[curQ]]);
  const totalAns=enabledQ.reduce((s,i)=>{const a=answers[Q[i].id]||{};return s+Object.keys(a).length},0);
  const totalItems=enabledQ.reduce((s,i)=>s+Q[i].items.length,0);
  maybeEnc(Math.round(totalAns/totalItems*100));
  const q=Q[enabledQ[curQ]],a=answers[q.id]||{};
  if(q.items.every(it=>a[it.n]!==undefined)){sDone();toast('Sezione completata! \u2728',2000)}
}

function updateGlobalBar(){
  const totalItems=enabledQ.reduce((s,i)=>s+Q[i].items.length,0);
  let doneItems=0;enabledQ.forEach(qi=>{const aa=answers[Q[qi].id]||{};doneItems+=Q[qi].items.filter(it=>aa[it.n]!==undefined).length});
  const gPct=totalItems?Math.round(doneItems/totalItems*100):0;
  const pb=$('pbi');if(pb){pb.style.width=gPct+'%';const pp=$('pbi-pct');if(pp)pp.textContent=gPct+'%';}
}

function updateFooter(q){
  const a=answers[q.id]||{};
  const done=q.items.filter(it=>a[it.n]!==undefined).length;
  const allDone=done===q.items.length;
  // sticky nav in header
  const snc=$('snc'),snb=$('snb');
  if(snc)snc.textContent=done+'/'+q.items.length;
  if(snb){snb.textContent=allDone?'\u2713 Completato':'Salva e esci';snb.className='btn btn-sm '+(allDone?'btn-g':'btn-p');}
  // bottom bar inline nel questionario
  const bnc=$('bnc'),bnb=$('bnb');
  if(bnc)bnc.textContent=done+'/'+q.items.length+' risposte';
  if(bnb){bnb.textContent=allDone?'\u2713 Completato':'Salva e torna';bnb.className='btn btn-sm '+(allDone?'btn-g':'btn-p');}
  // barra globale
  updateGlobalBar();
}

/* ===== GLOBAL NARRATIVE ===== */
function genNarrGlobal(sc,ranking){
  const nm=userName||'amico/a';
  let t='Ciao '+nm+',\n\nquesto report è stato costruito a partire dalle tue risposte. Non è un verdetto, ma una mappa — leggila con curiosità, come se stessi guardando per la prima volta il territorio che hai già dentro di te.\n\n';
  // Aree di interesse
  const top=ranking.slice(0,3);
  t+='<strong>Il tuo orientamento disciplinare.</strong> ';
  t+='Le aree che emergono con più forza sono <strong>'+top[0].area+'</strong> ('+top[0].pct+'%)';
  if(top[1])t+=', <strong>'+top[1].area+'</strong> ('+top[1].pct+'%)';
  if(top[2]&&top[2].pct>30)t+=' e <strong>'+top[2].area+'</strong> ('+top[2].pct+'%)';
  t+='. ';
  if(top[0].pct>70)t+='Un interesse molto netto: ottimo punto di partenza. ';
  else if(top[0].pct>50)t+='Interessi chiari e praticabili. ';
  else t+='Interessi distribuiti: esplora più percorsi prima di decidere. ';
  // Coping e locus
  const cop=sc.coping,loc=sc.locus;
  if(cop||loc){t+='\n\n<strong>Come affronti le sfide.</strong> ';
    if(cop){const att=cop['Attivo']?.pct||0,ev=cop['Evitante']?.pct||0;
      if(att>60&&ev<35)t+='Stile di coping prevalentemente attivo ('+att+'%): affronti le difficoltà di petto. ';
      else if(ev>50)t+='Componente evitante significativa ('+ev+'%): da presidiare nel percorso universitario, dove le scadenze si accumulano. ';
      else t+='Stile di coping equilibrato. ';}
    if(loc){const in_=loc['Interno']?.pct||0,ex=loc['Esterno']?.pct||0;
      if(in_>ex+15)t+='Locus interno solido ('+in_+'%): credi nel tuo impegno come leva principale. ';
      else if(ex>in_+15)t+='Tendenza all\'attribuzione esterna ('+ex+'%): il percorso universitario chiederà di attivare maggiore senso di agentività. ';
      else t+='Equilibrio tra locus interno ('+in_+'%) ed esterno ('+ex+'%): visione realistica. ';}}
  // Apprendimento
  const app2=sc.apprendimento;
  if(app2){const topA=Object.entries(app2).sort((a,b)=>b[1].pct-a[1].pct);
    t+='\n\n<strong>Come impari meglio.</strong> ';
    t+='Stile dominante: <strong>'+topA[0][0]+'</strong> ('+topA[0][1].pct+'%). ';
    if(topA[0][0]==='Attivo')t+='Impari facendo: cerca corsi con laboratori, project work e pratica diretta. ';
    else if(topA[0][0]==='Riflessivo')t+='Impari osservando e analizzando: valorizza contesti con tempo per lo studio individuale. ';
    else if(topA[0][0]==='Teorico')t+='La tua mente cerca struttura: i percorsi con solida base teorica ti sono congeniali. ';
    else if(topA[0][0]==='Pragmatico')t+='Vuoi vedere l\'utilità concreta: cerca corsi con tirocini, stage e problem-solving reale. ';}
  // Passioni
  const pass=sc.passioni_personali;
  if(pass){const topP=Object.entries(pass).sort((a,b)=>b[1].pct-a[1].pct).slice(0,2);
    t+='\n\n<strong>Le tue passioni.</strong> ';
    t+='<strong>'+topP[0][0]+'</strong> ('+topP[0][1].pct+'%)';
    if(topP[1]&&topP[1][1].pct>40)t+=' e <strong>'+topP[1][0]+'</strong> ('+topP[1][1].pct+'%)';
    t+='. Le passioni sono il segnale più autentico di chi sei. Verifica quanto le tue aree disciplinari di punta le intersecano. '}
  // Storia
  const st=sc.storia;
  if(st){t+='\n\n<strong>Il tuo percorso scolastico.</strong> ';
    const bar=st['Barriere']?.pct||0,met=st['Metodo di Studio']?.pct||0,rend=st['Rendimento Scolastico']?.pct||0;
    if(met>60)t+='Metodo di studio consolidato ('+met+'%): risorsa preziosa per il ritmo universitario. ';
    else if(met<35)t+='Metodo di studio da strutturare ('+met+'%): priorità prima dell\'iscrizione. ';
    if(bar>50)t+='Barriere rilevanti nel percorso ('+bar+'%): tenerle presenti nella scelta del carico. ';
    else if(bar<25)t+='Percorso relativamente fluido. ';
    if(rend>60)t+='Rendimento scolastico solido ('+rend+'%). ';}
  t+='\n\nRicorda: questi dati non decidono il tuo futuro. Sono una bussola, non una sentenza. Qualunque direzione sceglierai, porterai con te tutte le risorse che hai scoperto oggi.';
  return t.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

/* ===== NARRATIVE GENERATOR ===== */
function genNarr(id,sc){
  const hi=a=>sc[a]?.pct>=65,lo=a=>sc[a]?.pct<35;
  let t='';
  switch(id){
  case 'fronteggiamento':
    if(hi('Progettualità')&&hi('Ricerca di aiuto'))t='Profilo equilibrato: forte capacità di pianificazione unita a buona rete di supporto. Approccio maturo e flessibile al fronteggiamento.';
    else if(hi('Progettualità'))t='Forte tendenza alla pianificazione strategica autonoma. Potresti beneficiare dal coltivare la rete di supporto interpersonale.';
    else if(hi('Ricerca di aiuto'))t='Forte orientamento sociale nel fronteggiamento. Ti avvali del confronto con gli altri. Rafforza la pianificazione autonoma.';
    else t='Entrambe le dimensioni sono in sviluppo. Il percorso universitario richiederà di potenziare sia la pianificazione che la rete di supporto.';break;
  case 'coping':
    if(hi('Attivo')&&lo('Evitante'))t='Stile di coping prevalentemente attivo e orientato al problema. Profilo adatto alle sfide del percorso accademico.';
    else if(hi('Evitante'))t='Attenzione: tendenza significativa all\'evitamento. Sarà importante sviluppare strategie di fronteggiamento più attive e dirette.';
    else if(hi('Emotivo'))t='Buona regolazione emotiva. Affiancare al coping emotivo anche un approccio più attivo al problem-solving rafforzerà il profilo.';
    else t='Profilo di coping distribuito. Nessuna strategia prevalente: potenziale flessibilità adattiva.';break;
  case 'locus':
    if(hi('Interno')&&lo('Esterno'))t='Forte locus interno. Ti percepisci artefice del tuo percorso. Mantieni consapevolezza dei fattori contestuali reali senza sottovalutarli.';
    else if(hi('Esterno'))t='Prevalenza di attribuzione esterna. Il percorso universitario richiederà di riconoscere e attivare il tuo potere di azione personale.';
    else t='Equilibrio tra locus interno ed esterno. Profilo realistico che combina senso di agentività e consapevolezza del contesto.';break;
  case 'cognitivi':
    const topC=Object.entries(sc).sort((a,b)=>b[1].pct-a[1].pct).slice(0,3);
    t='Intelligenze predominanti: '+topC.map(([k,v])=>'<strong>'+k+'</strong> ('+v.pct+'%)').join(', ')+'. Ogni profilo è unico e presenta punti di forza distintivi.';break;
  case 'softskills':
    const topS=Object.entries(sc).sort((a,b)=>b[1].pct-a[1].pct).slice(0,3);
    const weakS=Object.entries(sc).filter(([k,v])=>v.pct<40).map(([k])=>k);
    t='Competenze più sviluppate: '+topS.map(([k,v])=>k+' ('+v.pct+'%)').join(', ')+'. ';
    if(weakS.length)t+='Da potenziare per il percorso universitario: '+weakS.join(', ')+'.';break;
  case 'apprendimento':
    const topA=Object.entries(sc).sort((a,b)=>b[1].pct-a[1].pct).slice(0,2);
    t='Stili predominanti: '+topA.map(([k,v])=>'<strong>'+k+'</strong> ('+v.pct+'%)').join(' e ')+'. ';
    if(topA[0]&&topA[0][0]==='Attivo')t+='Prediligi l\'esperienza diretta: cerca corsi con laboratori e project work.';
    else if(topA[0]&&topA[0][0]==='Riflessivo')t+='Prediligi l\'osservazione e l\'analisi: valorizza i contesti con studio individuale e feedback.';
    else if(topA[0]&&topA[0][0]==='Teorico')t+='Prediligi modelli e concetti: i percorsi con solida base teorica ti sono congeniali.';
    else if(topA[0]&&topA[0][0]==='Pragmatico')t+='Prediligi l\'applicazione immediata: cerca corsi con tirocini, stage e problem-solving reale.';
    break;
  case 'interessi_uni':
    const topI=Object.entries(sc).sort((a,b)=>b[1].pct-a[1].pct).slice(0,3);
    t='Aree di maggiore interesse: '+topI.map(([k,v])=>'<strong>'+k+'</strong> ('+v.pct+'%)').join(', ')+'. ';
    if(topI[0][1].pct>80)t+='Interesse molto marcato: ottimo punto di partenza per l\'orientamento.';
    else if(topI[0][1].pct>60)t+='Interessi chiari: esplora i corsi nelle aree top con visite e open day.';
    else t+='Interessi distribuiti: utile approfondire con esperienze concrete prima della scelta definitiva.';break;
  case 'passioni_personali':
    const topP=Object.entries(sc).sort((a,b)=>b[1].pct-a[1].pct).slice(0,3);
    t='Passioni principali: '+topP.map(([k,v])=>'<strong>'+k+'</strong> ('+v.pct+'%)').join(', ')+'. Le passioni personali sono indicatori preziosi di motivazione intrinseca e coerenza con il percorso.';break;
  case 'storia':
    if(hi('Metodo di Studio'))t='Buon metodo di studio consolidato. ';else if(lo('Metodo di Studio'))t='Metodo di studio da strutturare prima dell\'ingresso in università. ';
    else t='Metodo di studio nella media. ';
    if(hi('Rendimento Scolastico'))t+='Rendimento scolastico solido. ';
    if(hi('Barriere'))t+='Barriere significative segnalate nel percorso: è importante tenerne conto nella scelta. ';
    else if(lo('Barriere'))t+='Percorso scolastico relativamente privo di ostacoli rilevanti. ';
    if(hi('Esperienze Formative'))t+='Ricco bagaglio di esperienze formative extracurriculari.';break;
  default:t='Analisi non disponibile.'}
  return t;
}

  ranking.forEach((r,i)=>{

    if(i<5&&info){h+='<div style="margin:-4px 0 12px 16px;font-size:.78em;color:var(--text-sec);line-height:1.6"><strong>'+info.desc+'</strong><br>Corsi: '+info.corsi.join(', ')+'<br>Sbocchi: '+info.sbocchi.join(', ')+'<br>Test: '+info.test+' \u2022 Carico: '+info.carico+' \u2022 Stile: '+info.stile+(avail.length?' \u2022 Disponibile in Lombardia/online: '+avail.map(a=>a.nome).join(', '):'')+'</div>'}
  });
  h+='</div>';

    h+='<div class="nt">'+genNarr(q.id,s)+'</div></div>';
  });

  setTimeout(()=>{enabledQ.forEach((qi,idx)=>{
    const q=Q[qi],s=sc[q.id];if(!s)return;
    const cv=document.getElementById('ch'+idx);if(!cv)return;

    const ch=new Chart(cv,{type:labels.length>5?'radar':'bar',data:{labels,datasets:[{label:q.title,data,backgroundColor:colors,borderColor:colors.map(c=>c.replace('.7)','.9)')),borderWidth:2,fill:labels.length>5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:labels.length>5?{r:{min:0,max:100,ticks:{stepSize:25}}}:{y:{min:0,max:100},x:{ticks:{font:{size:9}}}}}});
    charts.push(ch);
  })},250);
}
